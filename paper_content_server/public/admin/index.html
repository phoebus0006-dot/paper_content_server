<!DOCTYPE html><html lang=zh-CN><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>电子纸管理后台</title><link rel=stylesheet href=/admin/admin.css></head><body><div id=login-overlay class=login-overlay><div class=login-box><h2>电子纸管理后台</h2><p style="color:#666;font-size:13px;margin-bottom:12px">输入 ADMIN_TOKEN 登录</p><form id=login-form><input type=password id=login-token placeholder=输入管理令牌 required><div id=login-error class=error>令牌无效</div><button type=submit class="btn btn-primary" style=width:100%>登录</button></form></div></div><div id=app class=layout style=display:none><div class=sidebar><h1>📋 电子纸</h1><nav><a href=# data-tab=dashboard class=active>总览</a><a href=# data-tab=news-page>新闻审查</a><a href=# data-tab=photos-page>图片库</a><a href=# data-tab=photo-editor-page style=display:none>图片编辑</a><a href=# data-tab=publish-page>发布中心</a><a href=# data-tab=status-page>运行状态</a></nav></div><div class=main><div id=dashboard class="page active"><h2>总览</h2><div class=card><div class=stat-grid><div class=stat-item><div class=label>当前模式</div><div class=value id=dash-mode>-</div></div><div class=stat-item><div class=label>当前 Slot</div><div class=value id=dash-slot>-</div></div><div class=stat-item><div class=label>新闻数量</div><div class=value id=dash-news>-</div></div><div class=stat-item><div class=label>Frame 缓存</div><div class=value id=dash-cache>-</div></div><div class=stat-item><div class=label>运行时间</div><div class=value id=dash-uptime>-</div></div><div class=stat-item><div class=label>手动覆盖</div><div class=value id=dash-override>-</div></div></div></div><div class=card><h3>操作</h3><div class=actions><button class="btn btn-danger" onclick=document.getElementById('publish-msg').textContent='将覆盖当前调度并发布新闻页';document.getElementById('publish-msg').style.display='block';publishNews()>发布新闻页</button><button class="btn btn-outline" onclick=clearOverride()>恢复自动调度</button></div><div id=publish-msg style=display:none;margin-top:8px;padding:8px;background:#f0f8f0;border-radius:4px></div></div></div><div id=news-page class=page><h2>新闻审查 <button class="btn btn-sm btn-outline" onclick=loadNewsReview() style=margin-left:8px>刷新</button><button class="btn btn-sm btn-primary" onclick=saveNewsDraft() style=margin-left:8px>保存草稿</button></h2><div id=news-list class=news-list></div></div><div id=photos-page class=page><h2>图片库</h2><div class=card><h3>上传图片</h3><form id=photo-upload-form><input type=file id=photo-file accept=image/jpeg,image/png,image/webp><button type=submit class="btn btn-primary btn-sm" style=margin-left:8px>上传</button></form></div><div id=photo-grid class=photo-grid></div></div><div id=photo-editor-page class=page><h2 id=editor-title>图片编辑</h2><div class=editor-layout><div class=preview><div class=preview-container><img id=editor-preview></div><h3 style=margin-top:12px>六色效果</h3><div class=preview-container><img id=editor-eink-preview></div><h3 style=margin-top:12px>颜色统计</h3><div id=editor-palette class=palette-bar></div></div><div class=controls><h3>调整</h3><label>亮度</label><input type=range min=0.5 max=1.5 step=0.05 value=1 oninput="updateEditorParam('brightness',this.value)"><span class=value id=val-brightness>1.0</span><label>对比度</label><input type=range min=0.5 max=1.5 step=0.05 value=1 oninput="updateEditorParam('contrast',this.value)"><span class=value id=val-contrast>1.0</span><label>饱和度</label><input type=range min=0 max=2 step=0.05 value=1 oninput="updateEditorParam('saturation',this.value)"><span class=value id=val-saturation>1.0</span><label>Gamma</label><input type=range min=0.5 max=2 step=0.05 value=1 oninput="updateEditorParam('gamma',this.value)"><span class=value id=val-gamma>1.0</span><label>旋转</label><select onchange="updateEditorParam('rotate',this.value)"><option value=0>0°</option><option value=90>90°</option><option value=180>180°</option><option value=270>270°</option></select><div class=actions style=margin-top:12px><button class="btn btn-primary" onclick=saveEdit()>保存编辑</button><button class="btn btn-success" onclick=publishPhoto(EDITOR_STATE.id)>发布到电子纸</button></div></div></div></div><div id=publish-page class=page><h2>发布中心</h2><div class=card><h3>发布历史</h3><div id=publish-history-list></div></div></div><div id=status-page class=page><h2>运行状态</h2><div class=card><div class=stat-grid><div class=stat-item><div class=label>运行时间</div><div class=value id=status-uptime>-</div></div><div class=stat-item><div class=label>模式</div><div class=value id=status-mode>-</div></div><div class=stat-item><div class=label>Slot</div><div class=value id=status-slot>-</div></div><div class=stat-item><div class=label>Frame 缓存</div><div class=value id=status-cache>-</div></div></div></div></div></div></div><script src=/admin/admin.js></script></body></html>
